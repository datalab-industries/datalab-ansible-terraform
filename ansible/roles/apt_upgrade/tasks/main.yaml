---
- name: Upgrade packages (Ubuntu)
  become: true
  when: ansible_distribution == 'Ubuntu'
  ansible.builtin.apt:
    upgrade: true
    update_cache: true
    cache_valid_time: 86400

- name: Install unattended-upgrades (Ubuntu)
  become: true
  when: ansible_distribution == 'Ubuntu'
  ansible.builtin.apt:
    name: unattended-upgrades
    state: present
    update_cache: true

- name: Configure unattended-upgrades auto-reboot (Ubuntu)
  become: true
  when: ansible_distribution == 'Ubuntu'
  ansible.builtin.copy:
    dest: /etc/apt/apt.conf.d/52unattended-upgrades-reboot
    mode: '0644'
    content: |
      Unattended-Upgrade::Automatic-Reboot "true";
      Unattended-Upgrade::Automatic-Reboot-WithUsers "true";
      Unattended-Upgrade::Automatic-Reboot-Time "02:00";

- name: Enable unattended-upgrades periodic runs (Ubuntu)
  become: true
  when: ansible_distribution == 'Ubuntu'
  ansible.builtin.copy:
    dest: /etc/apt/apt.conf.d/20auto-upgrades
    mode: '0644'
    content: |
      APT::Periodic::Update-Package-Lists "1";
      APT::Periodic::Unattended-Upgrade "1";

- name: Upgrade packages (RedHat)
  become: true
  when: ansible_os_family == 'RedHat'
  ansible.builtin.dnf:
    name: '*'
    state: latest  # noqa: package-latest

- name: Install dnf-automatic (RedHat)
  become: true
  when: ansible_os_family == 'RedHat'
  ansible.builtin.dnf:
    name: dnf-automatic
    state: present

- name: Configure dnf-automatic to apply updates (RedHat)
  become: true
  when: ansible_os_family == 'RedHat'
  community.general.ini_file:
    path: /etc/dnf/automatic.conf
    section: commands
    option: "{{ item.option }}"
    value: "{{ item.value }}"
    mode: '0644'
  loop:
    - { option: upgrade_type, value: 'security'}
    - { option: apply_updates, value: 'yes' }
    - { option: reboot, value: when-needed }

- name: Override dnf-automatic timer to run at 02:00 (RedHat)
  become: true
  when: ansible_os_family == 'RedHat'
  ansible.builtin.copy:
    dest: /etc/systemd/system/dnf-automatic.timer.d/override.conf
    mode: '0644'
    content: |
      [Timer]
      OnCalendar=
      OnCalendar=*-*-* 02:00:00
      RandomizedDelaySec=0
  register: dnf_automatic_timer_override

- name: Enable dnf-automatic timer (RedHat)
  become: true
  when: ansible_os_family == 'RedHat'
  ansible.builtin.systemd:
    name: dnf-automatic.timer
    enabled: true
    state: started
    daemon_reload: "{{ dnf_automatic_timer_override.changed }}"
