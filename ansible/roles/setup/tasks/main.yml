---
- name: Mount data disk (if requested)
  become: true
  when: mount_data_disk is defined and mount_data_disk != ''
  ansible.posix.mount:
    path: /data
    src: "{{ mount_data_disk | default('') }}"
    fstype: "{{ data_disk_type | default('xfs') }}"
    state: mounted

- name: Install aptitude
  become: true
  when: ansible_os_family == 'Debian'
  ansible.builtin.apt:
    name: aptitude
    state: present
    update_cache: true

- name: Install required system packages (24.04)
  become: true
  when: ansible_distribution == 'Ubuntu' and ansible_distribution_major_version == '24'
  ansible.builtin.apt:
    pkg:
      - ca-certificates
      - python3-pip
    state: present
    update_cache: true

- name: Install required system packages (22.04)
  become: true
  when: ansible_distribution == 'Ubuntu' and ansible_distribution_major_version == '22'
  ansible.builtin.apt:
    pkg:
      - ca-certificates
      - python3-pip
      - python3-passlib
      - python3.10-venv
    state: present
    update_cache: true

- name: Install required system packages (RHEL)
  become: true
  when: ansible_os_family == 'RedHat'
  ansible.builtin.dnf:
    name:
      - ca-certificates
      - python3-pip
    state: present
