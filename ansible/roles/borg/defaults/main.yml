---
borg_encryption_passphrase: ""
borg_exclude_patterns:
  - /data/backups
borg_exclude_from: []
borg_one_file_system: true
borg_encryption_passcommand: false
borg_lock_wait_time: 5
borg_ssh_key_type: ed25519
borg_ssh_key_name: id_{{ borg_ssh_key_type }}
borg_ssh_key_file_path: "{{ backup_user_info.home }}/.ssh/{{ borg_ssh_key_name }}"
borg_ssh_command: ssh -o ServerAliveInterval=30 -o ServerAliveCountMax=3
borg_remote_path: false
borg_remote_rate_limit: 0
borg_source_directories:
  - /data
borg_retention_policy:
  keep_daily: 30
  keep_weekly: 0
  keep_monthly: 12
  keep_yearly: 4
borg_version: false
borgmatic_timer_cron_name: borgmatic
borgmatic_timer: cron
borgmatic_timer_hour: "{{ range(0, 5) | random(seed=inventory_hostname) }}"
borgmatic_timer_minute: "{{ range(0, 59) | random(seed=inventory_hostname) }}"
borg_install_method: package
borg_require_epel: "{{ ansible_os_family == 'RedHat' and ansible_distribution != 'Fedora' }}"

# Host directory read by node_exporter's textfile collector. The borgmatic
# container bind-mounts this to /metrics and writes status metrics there.
borg_textfile_collector_path: /var/lib/node_exporter/textfile_collector

borgmatic_hooks:
  before_backup:
    - echo "`date` - Starting backup."
  after_backup:
    - python3 /borgmatic/write-metrics.py success
  on_error:
    - python3 /borgmatic/write-metrics.py error
  mongodb_databases:
    - name: all
      hostname: datalab-database-1
      port: 27017
borgmatic_checks:
  - name: repository
    frequency: 4 weeks
  - name: archives
    frequency: 6 weeks
borgmatic_check_last: 3
borgmatic_store_atime: true
borgmatic_store_ctime: true
borgmatic_relocated_repo_access_is_ok: false
borgmatic_version: ">=1.7.11"

borg_venv_path: /opt/borgmatic
