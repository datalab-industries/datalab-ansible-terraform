---
- name: Bootstrap non-root ansible_user
  hosts: all
  gather_facts: true
  # Connect as root to create the target ansible_user before later plays
  # connect as it. No-op when ansible_user is already root.
  remote_user: root
  roles:
    - role: bootstrap_user
      tags: [setup, bootstrap]

- name: Create and maintain a datalab
  hosts: all
  vars:
    # root behaves differently than other users; set home dir accordingly
    ansible_user_home_dir: "{{ '/' + ansible_ssh_user if ansible_ssh_user == 'root' else '/home/' + ansible_ssh_user }}"
  roles:
    - role: preflight
      name: Check if the system is ready for the playbook
      tags: [setup]
    - role: setup
      name: Run OS and disk set up tasks
      tags: [setup]
    - role: docker
      name: Install and configure Docker
      tags: [setup]
    - role: fail2ban
      name: Install and configure fail2ban
      tags: [setup]
    - role: ssh_hardening
      name: Disable password SSH and harden sshd
      tags: [setup, ssh]
    - role: ssl_first_run
      name: Run stripped down nginx and SSL for the first time
      tags: [setup, ssl]
    - role: datalab
      name: Build and launch datalab services
      tags: [setup, deploy]
    - role: extras
      name: Deploy any extras found in src/extras
      tags: [setup, extras]
    - role: nginx
      name: Launch nginx container with autorenewing certbot
      tags: [setup, nginx, maintenance, ssl]
    - role: borg
      name: Configure borg(matic) and remote backups
      tags: [borg]
    - role: monitoring
      name: Install and configure prometheus monitoring stack
      tags: [monitoring]

  tasks:
    - name: Keep all packages up-to-date
      ansible.builtin.include_role:
        name: apt_upgrade
        apply:
          tags: [maintenance]
      tags: [maintenance]
